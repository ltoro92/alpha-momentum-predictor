services:
  postgres:
    image: postgres:16
    container_name: alpha_momentum_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: alpha_momentum
      POSTGRES_USER: alpha_user
      POSTGRES_PASSWORD: alpha_password
    ports:
      - "5432:5432"
    volumes:
      - alpha_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7
    container_name: alpha_momentum_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  alpha_postgres_data: